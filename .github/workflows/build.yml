name: Build Jacal

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Linux GUI (Qt6 QML)
  build-linux-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-templates qml6-module-qtqml-workerscript

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload Linux GUI
        uses: actions/upload-artifact@v4
        with:
          name: jackal-linux-gui
          path: build/qml-client/jackal

  # Linux Console
  build-linux-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Console
        run: |
          g++ -std=c++17 -O2 -I core \
            core/types.cpp core/game_state.cpp core/rules.cpp \
            core/game.cpp core/ai.cpp console/main.cpp \
            -o jackal-console-linux

      - name: Smoke test
        run: echo -e "1\n0\n\nq" | timeout 5 ./jackal-console-linux || true

      - name: Upload Linux Console
        uses: actions/upload-artifact@v4
        with:
          name: jackal-linux-console
          path: jackal-console-linux

  # Windows Console (cross-compiled)
  build-windows-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Build Windows exe
        run: |
          x86_64-w64-mingw32-g++ -std=c++17 -O2 -static \
            -I core \
            core/types.cpp core/game_state.cpp core/rules.cpp \
            core/game.cpp core/ai.cpp console/main.cpp \
            -o jackal-win64.exe

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: jackal-win64
          path: jackal-win64.exe
